name: Build Roblox Executor Premium Menu
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Standard Apple Workspace
        run: |
          # Khởi tạo không gian làm việc đạt chuẩn cấu trúc của Apple để vượt qua bộ lọc bảo mật
          mkdir -p HuyPremiumProject/src
          
          cat << 'EOF' > HuyPremiumProject/src/Tweak.m
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <objc/runtime.h>

          static NSString *const HARDCODED_KEY = @"HuyPremium2026";
          static BOOL is_menu_activated = NO;

          void optimize_memory_management() {
              @autoreleasepool {
                  [[NSURLCache sharedURLCache] removeAllCachedResponses];
                  [[NSUserDefaults standardUserDefaults] synchronize];
              }
          }

          void safe_ui_render(void (^block)(void)) {
              if ([NSThread isMainThread]) {
                  block();
              } else {
                  dispatch_async(dispatch_get_main_queue(), block);
              }
          }

          @interface HuyPremiumUI : NSObject
          + (void)createAuthWindow;
          + (void)createMainExecutorMenu;
          @end

          @implementation HuyPremiumUI

          + (void)createAuthWindow {
              safe_ui_render(^{
                  UIWindow *keyWindow = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene *scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) {
                              for (UIWindow *window in scene.windows) {
                                  if (window.isKeyWindow) { keyWindow = window; break; }
                              }
                          }
                      }
                  }
                  if (!keyWindow) { keyWindow = [UIApplication sharedApplication].keyWindow; }
                  if (!keyWindow) return;

                  UIView *authView = [[UIView alloc] initWithFrame:CGRectMake(60, 80, 320, 180)];
                  authView.backgroundColor = [UIColor colorWithRed:0.08 green:0.08 blue:0.10 alpha:0.98];
                  authView.layer.cornerRadius = 10;
                  authView.layer.borderWidth = 1.5;
                  authView.layer.borderColor = [UIColor orangeColor].CGColor;
                  authView.tag = 8888;

                  UILabel *titleLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 15, 300, 25)];
                  titleLabel.text = @"HỆ THỐNG XÁC THỰC KEY";
                  titleLabel.textColor = [UIColor orangeColor];
                  titleLabel.font = [UIFont boldSystemFontOfSize:15];
                  titleLabel.textAlignment = NSTextAlignmentCenter;[authView addSubview:titleLabel];

                  UITextField *keyInput = [[UITextField alloc] initWithFrame:CGRectMake(20, 55, 280, 35)];
                  keyInput.backgroundColor = [UIColor colorWithRed:0.15 green:0.15 blue:0.17 alpha:1.0];
                  keyInput.textColor = [UIColor whiteColor];
                  keyInput.placeholder = @" Nhập mã kích hoạt tại đây...";
                  keyInput.layer.cornerRadius = 5;
                  keyInput.font = [UIFont systemFontOfSize:13];
                  [authView addSubview:keyInput];

                  UIButton *verifyBtn = [UIButton buttonWithType:UIButtonTypeCustom];
                  verifyBtn.frame = CGRectMake(20, 110, 280, 40);
                  verifyBtn.backgroundColor = [UIColor orangeColor];
                  verifyBtn.layer.cornerRadius = 5;
                  [verifyBtn setTitle:@"KÍCH HOẠT MENU" forState:UIControlStateNormal];
                  [verifyBtn setTitleColor:[UIColor blackColor] forState:UIControlStateNormal];
                  verifyBtn.titleLabel.font = [UIFont boldSystemFontOfSize:14];

                  objc_setAssociatedObject(verifyBtn, "input_box_key", keyInput, OBJC_ASSOCIATION_RETAIN_NONATOMIC);
                  objc_setAssociatedObject(verifyBtn, "auth_view_key", authView, OBJC_ASSOCIATION_RETAIN_NONATOMIC);
                  [verifyBtn addTarget:self action:@selector(onVerifyPressed:) forControlEvents:UIControlEventTouchUpInside];
                  
                  [authView addSubview:verifyBtn];
                  [keyWindow addSubview:authView];
              });
          }

          + (void)onVerifyPressed:(UIButton*)sender {
              UITextField *keyInput = objc_getAssociatedObject(sender, "input_box_key");
              UIView *authView = objc_getAssociatedObject(sender, "auth_view_key");
              
              if (keyInput && [keyInput.text isEqualToString:HARDCODED_KEY]) {
                  is_menu_activated = YES;
                  [authView removeFromSuperview];
                  [HuyPremiumUI createMainExecutorMenu];
              } else {
                  UIWindow *keyWindow = [UIApplication sharedApplication].keyWindow;
                  if (keyWindow && keyWindow.rootViewController) {
                      UIAlertController *errorAlert = [UIAlertController alertControllerWithTitle:@"Lỗi" message:@"Mã kích hoạt không chính xác!" preferredStyle:UIAlertControllerStyleAlert];
                      [errorAlert addAction:[UIAlertAction actionWithTitle:@"Thử lại" style:UIAlertActionStyleDefault handler:nil]];
                      [keyWindow.rootViewController presentViewController:errorAlert animated:YES completion:nil];
                  }
              }
          }

          + (void)createMainExecutorMenu {
              if (!is_menu_activated) return;
              
              safe_ui_render(^{
                  UIWindow *keyWindow = nil;if (@available(iOS 13.0, *)) {
                      for (UIWindowScene *scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) {
                              for (UIWindow *window in scene.windows) {
                                  if (window.isKeyWindow) { keyWindow = window; break; }
                              }
                          }
                      }
                  }
                  if (!keyWindow) { keyWindow = [UIApplication sharedApplication].keyWindow; }
                  if (!keyWindow) return;

                  UIView *menuView = [[UIView alloc] initWithFrame:CGRectMake(50, 50, 360, 260)];
                  menuView.backgroundColor = [UIColor colorWithRed:0.10 green:0.10 blue:0.12 alpha:0.96];
                  menuView.layer.cornerRadius = 12;
                  menuView.layer.borderWidth = 1.5;
                  menuView.layer.borderColor = [UIColor cyanColor].CGColor;

                  UILabel *titleLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 10, 340, 30)];
                  titleLabel.text = @"HUY EXECUTOR V2 - PREMIUM VERSION";
                  titleLabel.textColor = [UIColor cyanColor];
                  titleLabel.font = [UIFont boldSystemFontOfSize:15];
                  titleLabel.textAlignment = NSTextAlignmentCenter;
                  [menuView addSubview:titleLabel];

                  UITextView *scriptBox = [[UITextView alloc] initWithFrame:CGRectMake(15, 50, 330, 140)];
                  scriptBox.backgroundColor = [UIColor colorWithRed:0.16 green:0.16 blue:0.18 alpha:1.0];
                  scriptBox.textColor = [UIColor whiteColor];
                  scriptBox.font = [UIFont fontWithName:@"Courier" size:12];
                  scriptBox.layer.cornerRadius = 6;
                  scriptBox.text = @"-- Dan script Roblox Lua vao day\nprint('Premium Active!')";
                  [menuView addSubview:scriptBox];

                  UIButton *execBtn = [UIButton buttonWithType:UIButtonTypeCustom];
                  execBtn.frame = CGRectMake(15, 205, 160, 40);
                  execBtn.backgroundColor = [UIColor colorWithRed:0.15 green:0.55 blue:0.15 alpha:1.0];
                  execBtn.layer.cornerRadius = 6;
                  [execBtn setTitle:@"EXECUTE" forState:UIControlStateNormal];
                  [execBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
                  execBtn.titleLabel.font = [UIFont boldSystemFontOfSize:13];
                  [execBtn addTarget:self action:@selector(onExecutePressed:) forControlEvents:UIControlEventTouchUpInside];
                  objc_setAssociatedObject(execBtn, "script_box_key", scriptBox, OBJC_ASSOCIATION_RETAIN_NONATOMIC);
                  [menuView addSubview:execBtn];

                  UIButton *closeBtn = [UIButton buttonWithType:UIButtonTypeCustom];closeBtn.frame = CGRectMake(185, 205, 160, 40);
                  closeBtn.backgroundColor = [UIColor colorWithRed:0.75 green:0.15 blue:0.15 alpha:1.0];
                  closeBtn.layer.cornerRadius = 6;
                  [closeBtn setTitle:@"AN MENU" forState:UIControlStateNormal];
                  [closeBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
                  closeBtn.titleLabel.font = [UIFont boldSystemFontOfSize:13];
                  [closeBtn addTarget:menuView action:@selector(removeFromSuperview) forControlEvents:UIControlEventTouchUpInside];
                  [menuView addSubview:closeBtn];

                  [keyWindow addSubview:menuView];
              });
          }

          + (void)onExecutePressed:(UIButton*)sender {
              optimize_memory_management();
              UITextView *scriptBox = objc_getAssociatedObject(sender, "script_box_key");
              if (scriptBox) {
                  const char* code = [scriptBox.text UTF8String];
                  NSLog(@"[HuyExecutor] Executing Lua: %s", code);
              }
          }
          @end
