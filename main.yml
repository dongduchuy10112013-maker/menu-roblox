        [speedHackItem setTitle:@"Toggle Speed Hack (2x)"];
        [speedHackItem setAction:@selector(toggleSpeedAction:)];
        [speedHackItem setTarget:self];
        [speedHackItem setKeyEquivalent:@"s"];
        [speedHackItem setKeyEquivalentModifierMask:NSEventModifierFlagCommand];
        
        // === ITEMS SECTION ===
        NSMenuItem *itemsSection = [[NSMenuItem alloc] init];
        [itemsSection setTitle:@"Items"];
        [itemsSection setEnabled:NO];
        
        NSMenuItem *addItemMenuItem = [[NSMenuItem alloc] init];
