// ========== ACTION HANDLERS ==========
void toggleGodModeAction(id self, SEL _cmd) {
    toggleGodMode();
}

void toggleAmmoAction(id self, SEL _cmd) {
    toggleUnlimitedAmmo();
}

void toggleKeysAction(id self, SEL _cmd) {
    toggleAllKeys();
}

void toggleNoClipAction(id self, SEL _cmd) {
    toggleNoClip();
}

void toggleSpeedAction(id self, SEL _cmd) {
    toggleSpeedHack();
}

void addItemAction(id self, SEL _cmd) {
    addItem();
}

void unlockDoorsAction(id self, SEL _cmd) {
    unlockAllDoors();
}

void killEnemiesAction(id self, SEL _cmd) {
    killAllEnemies();
}

void teleportExitAction(id self, SEL _cmd) {
    teleportToExit();
}

void debugInfoAction(id self, SEL _cmd) {
    showDebugInfo();
}

void resetAction(id self, SEL _cmd) {
    resetGame();
}

void quitAction(id self, SEL _cmd) {
    [NSApp terminate:nil];
}
