        [enemiesSection setEnabled:NO];
        
        NSMenuItem *killEnemiesItem = [[NSMenuItem alloc] init];
        [killEnemiesItem setTitle:@"Kill All Enemies"];
        [killEnemiesItem setAction:@selector(killEnemiesAction:)];
        [killEnemiesItem setTarget:self];
        [killEnemiesItem setKeyEquivalent:@"e"];
        [killEnemiesItem setKeyEquivalentModifierMask:NSEventModifierFlagCommand];
        
        // === TELEPORT SECTION ===
