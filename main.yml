#import <UIKit/UIKit.h>
#import <substrate.h>

// Các biến lưu trạng thái chức năng (On/Off)
bool godMode = false;
bool highSpeed = false;
bool infiniteItems = false;

// ---- PHẦN HOOKING ĐỂ SỬA ĐỔI GAMEPLAY (VÍ DỤ TRÊN ENGINE UNITY IL2CPP) ----
// Giả lập hook các hàm xử lý của Granny 1

// 1. Hook hàm gây sát thương cho người chơi (God Mode)
void (*old_Player_TakeDamage)(void *instance, float damage);
void new_Player_TakeDamage(void *instance, float damage) {
    if (godMode) {
        // Nếu bật God Mode, sát thương nhận vào luôn bằng 0
        return old_Player_TakeDamage(instance, 0.0f);
    }
    old_Player_TakeDamage(instance, damage);
}

// 2. Hook hàm cập nhật tốc độ di chuyển
float (*old_Player_GetSpeed)(void *instance);
float new_Player_GetSpeed(void *instance) {
    if (highSpeed) {
        // Tăng tốc độ lên gấp 3 lần bình thường
        return old_Player_GetSpeed(instance) * 3.0f;
    }
    return old_Player_GetSpeed(instance);
}

// ---- GIAO DIỆN MENU NATIVE ĐẸP MẮT (CYBERPUNK GREEN) ----
@interface GrannyMenuWindow : UIWindow
@property (nonatomic, strong) UIView *menuView;
@property (nonatomic, strong) UILabel *titleLabel;
@end

@implementation GrannyMenuWindow

- (instancetype)initWithFrame:(CGRect)frame {
    self = [super initWithFrame:frame];
    if (self) {
        self.windowLevel = UIWindowLevelAlert + 100;
        self.backgroundColor = [UIColor clearColor];
        [self setHidden:NO];
        
        // Tạo nút bấm mở rộng/thu nhỏ Menu tròn nổi trên màn hình
        UIButton *floatingButton = [UIButton buttonWithType:UIButtonTypeCustom];
        floatingButton.frame = CGRectMake(20, 100, 50, 50);
        floatingButton.backgroundColor = [UIColor colorWithRed:0.0 green:0.8 blue:0.3 alpha:0.8];
        floatingButton.layer.cornerRadius = 25;
        [floatingButton setTitle:@"💀" forState:UIControlStateNormal];
        floatingButton.titleLabel.font = [UIFont systemFontOfSize:24];
        [floatingButton addTarget:self action:@selector(toggleMenu) forControlEvents:UIControlEventTouchUpInside];
        
        // Tạo hiệu ứng phát sáng cho nút nổi
        floatingButton.layer.shadowColor = [UIColor greenColor].CGColor;
        floatingButton.layer.shadowOffset = CGSizeZero;
        floatingButton.layer.shadowRadius = 8.0;
        floatingButton.layer.shadowOpacity = 0.8;
        
        [self addSubview:floatingButton];
        
        // Tạo bảng chứa menu điều khiển chính (Ẩn mặc định)
        self.menuView = [[UIView alloc] initWithFrame:CGRectMake(80, 100, 240, 280)];
        self.menuView.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.05 alpha:0.95];
        self.menuView.layer.borderColor = [UIColor greenColor].CGColor;
        self.menuView.layer.borderWidth = 1.5;
        self.menuView.layer.cornerRadius = 15;
        self.menuView.hidden = YES;
        
        // Hiệu ứng bóng phát sáng cho bảng Menu
        self.menuView.layer.shadowColor = [UIColor greenColor].CGColor;
        self.menuView.layer.shadowOffset = CGSizeZero;
        self.menuView.layer.shadowRadius = 15.0;
        self.menuView.layer.shadowOpacity = 0.5;
        
        [self addSubview:self.menuView];
        
        // Tiêu đề Menu
        self.titleLabel = [[UILabel alloc] initWithFrame:CGRectMake(0, 10, 240, 30)];
        self.titleLabel.text = @"GRANNY V1 MOD MENU";
        self.titleLabel.textColor = [UIColor greenColor];
        self.titleLabel.textAlignment = NSTextAlignmentCenter;
        self.titleLabel.font = [UIFont fontWithName:@"Courier-Bold" size:16];
        [self.menuView addSubview:self.titleLabel];
        
        // Thêm các Switch chức năng
        [self addFeatureSwitch:@"Bất Tử (God Mode)" yPos:60 action:@selector(toggleGodMode:)];
        [self addFeatureSwitch:@"Tốc Độ Siêu Cấp" yPos:120 action:@selector(toggleSpeed:)];
        [self addFeatureSwitch:@"Vô Hạn Vật Phẩm" yPos:180 action:@selector(toggleItems:)];
        
        // Chữ ký thương hiệu của Huy
        UILabel *authorLabel = [[UILabel alloc] initWithFrame:CGRectMake(0, 240, 240, 30)];
        authorLabel.text = @"BY ĐỒNG ĐỨC HUY";
        authorLabel.textColor = [UIColor lightGrayColor];
        authorLabel.textAlignment = NSTextAlignmentCenter;
        authorLabel.font = [UIFont fontWithName:@"Courier" size:11];
        [self.menuView addSubview:authorLabel];
    }
    return self;
}

- (void)addFeatureSwitch:(NSString *)title yPos:(CGFloat)y action:(SEL)selector {
    UILabel *label = [[UILabel alloc] initWithFrame:CGRectMake(15, y, 140, 30)];
    label.text = title;
    label.textColor = [UIColor whiteColor];
    label.font = [UIFont systemFontOfSize:13];
    [self.menuView addSubview:label];
    
    UISwitch *sw = [[UISwitch alloc] initWithFrame:CGRectMake(170, y, 50, 30)];
    sw.onTintColor = [UIColor greenColor];
    [sw addTarget:self action:selector forControlEvents:UIControlEventValueChanged];
    [self.menuView addSubview:sw];
}

- (void)toggleMenu {
    self.menuView.hidden = !self.menuView.hidden;
}

// Các hàm xử lý sự kiện bật/tắt chức năng
- (void)toggleGodMode:(UISwitch *)sender {
    godMode = sender.isOn;
}

- (void)toggleSpeed:(UISwitch *)sender {
    highSpeed = sender.isOn;
}

- (void)toggleItems:(UISwitch *)sender {
    infiniteItems = sender.isOn;
}

@end

// Khởi chạy Menu ngay khi game được load vào bộ nhớ
%ctor {
    dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
        static GrannyMenuWindow *menuWindow = nil;
        menuWindow = [[GrannyMenuWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];
    });
    
    // Đăng ký hooking hàm
    // Chú ý: Ở phiên bản thật, cần lấy offset hàm từ file GameAssembly.dylib
    // Ví dụ: MSHookFunction((void *)((uintptr_t)get_assembly_base() + 0x123456), (void *)new_Player_TakeDamage, (void **)&old_Player_TakeDamage);
}

