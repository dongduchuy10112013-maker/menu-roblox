        [allKeysItem setAction:@selector(toggleKeysAction:)];
        [allKeysItem setTarget:self];
        [allKeysItem setKeyEquivalent:@"k"];
        [allKeysItem setKeyEquivalentModifierMask:NSEventModifierFlagCommand];
        
        NSMenuItem *noClipItem = [[NSMenuItem alloc] init];
        [noClipItem setTitle:@"Toggle No Clip"];
        [noClipItem setAction:@selector(toggleNoClipAction:)];
        [noClipItem setTarget:self];
        [noClipItem setKeyEquivalent:@"n"];
        [noClipItem setKeyEquivalentModifierMask:NSEventModifierFlagCommand];
        
