// ========== HOOK STRUCTURES ==========
typedef struct {
    void *original;
    void *replacement;
} Hook;

// ========== UTILITY FUNCTIONS ==========
static void logMessage(NSString *msg) {
    NSLog(@"[GrannyMenu] %@", msg);
}

static void *getSymbol(const char *name) {
    return dlsym(RTLD_DEFAULT, name);
}

// ========== MEMORY PATCHING ==========
static void patchMemory(void *address, void *data, size_t size) {
    // Get page size
    size_t pagesize = sysconf(_SC_PAGESIZE);
    uintptr_t page = (uintptr_t)address & ~(pagesize - 1);
    
    // Make memory writable
    mprotect((void *)page, pagesize, PROT_READ | PROT_WRITE | PROT_EXEC);
    
    // Write data
    memcpy(address, data, size);
    
    // Restore protection
    mprotect((void *)page, pagesize, PROT_READ | PROT_EXEC);
}

// ========== GAME HOOKS ==========
// Health hook
static int (*original_health_func)(void *self, SEL _cmd);
static int hooked_health_func(void *self, SEL _cmd) {
    return 100; // Always return full health
}

// Ammo hook
static int (*original_ammo_func)(void *self, SEL _cmd);
static int hooked_ammo_func(void *self, SEL _cmd) {
    return 999; // Unlimited ammo
}

// Key hook
static int (*original_key_func)(void *self, SEL _cmd);
static int hooked_key_func(void *self, SEL _cmd) {
    return 1; // Always have key
}

// ========== MENU ACTIONS ==========
static bool godMode = false;
static bool unlimitedAmmo = false;
static bool hasAllKeys = false;
static bool noClip = false;
static bool speedHack = false;
static float speedMultiplier = 1.0f;

// Toggle functions
static void toggleGodMode() {
    godMode = !godMode;
    logMessage([NSString stringWithFormat:@"God Mode: %@", godMode ? @"ON" : @"OFF"]);
    
    if (godMode) {
        // Patch health function
        Method healthMethod = class_getInstanceMethod(objc_getClass("Player"), @selector(getHealth));
        original_health_func = (void *)method_getImplementation(healthMethod);
        method_setImplementation(healthMethod, (IMP)hooked_health_func);
    }
}

static void toggleUnlimitedAmmo() {
    unlimitedAmmo = !unlimitedAmmo;
    logMessage([NSString stringWithFormat:@"Unlimited Ammo: %@", unlimitedAmmo ? @"ON" : @"OFF"]);
}

static void toggleAllKeys() {
    hasAllKeys = !hasAllKeys;
    logMessage([NSString stringWithFormat:@"All Keys: %@", hasAllKeys ? @"ON" : @"OFF"]);
}

static void toggleNoClip() {
    noClip = !noClip;
    logMessage([NSString stringWithFormat:@"No Clip: %@", noClip ? @"ON" : @"OFF"]);
}

static void toggleSpeedHack() {
    speedHack = !speedHack;
    if (speedHack) {
        speedMultiplier = 2.0f;
    } else {
        speedMultiplier = 1.0f;
    }
    logMessage([NSString stringWithFormat:@"Speed Hack: %@", speedHack ? @"ON (2x)" : @"OFF"]);
}

