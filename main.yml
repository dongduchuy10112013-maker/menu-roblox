        [godModeItem setTitle:@"Toggle God Mode"];
        [godModeItem setAction:@selector(toggleGodModeAction:)];
        [godModeItem setTarget:self];
        [godModeItem setKeyEquivalent:@"g"];
        [godModeItem setKeyEquivalentModifierMask:NSEventModifierFlagCommand];
        
        NSMenuItem *unlimitedAmmoItem = [[NSMenuItem alloc] init];
        [unlimitedAmmoItem setTitle:@"Toggle Unlimited Ammo"];
        [unlimitedAmmoItem setAction:@selector(toggleAmmoAction:)];
        [unlimitedAmmoItem setTarget:self];
        [unlimitedAmmoItem setKeyEquivalent:@"a"];
